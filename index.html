<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Product Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      model-viewer {
        width: 100%;
        height: 70vh;
        background: white;
        border-radius: 12px;
      }
      h1, p {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>AR Viewer</h1>
      <p>Tap the AR button on mobile to place the model in space.</p>

      <model-viewer
        src="test_Android.glb"
        ios-src="test_IOS.usdz"
        poster="poster.webp"
        alt="3D product model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1">
      </model-viewer>
    </div>
  </body>
</html>
